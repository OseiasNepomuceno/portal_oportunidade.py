name: Minerador Nacional de Vagas

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite (Horário UTC)
  workflow_dispatch: # Permite que você rode manualmente clicando no botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Atualizado para evitar erros de dependências

      - name: Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install pandas requests st-gsheets-connection streamlit

      - name: Rodar Minerador
        env:
          # Variáveis de ambiente vinculadas aos seus Secrets do GitHub
          APP_ID: ${{ secrets.APP_ID }}
          APP_KEY: ${{ secrets.APP_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          # Verifique se o nome do seu Secret para a URL da planilha é exatamente GSHEETS_URL
          CONNECTIONS_GSHEETS_SPREADSHEET: ${{ secrets.GSHEETS_URL }}
        run: python minerador_vagas_brazil.py
