name: Minerador Nacional de Vagas

on:
  schedule:
    - cron: '0 0 * * *' # Roda todo dia à meia-noite (Horário UTC)
  workflow_dispatch: # Permite que você rode manualmente clicando no botão

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install pandas requests st-gsheets-connection streamlit

      # --- AJUSTE FINAL: CRIA O ARQUIVO DE SECRETS QUE O STREAMLIT EXIGE ---
      - name: Criar Streamlit Secrets
        run: |
          mkdir -p .streamlit
          echo "[connections.gsheets]" > .streamlit/secrets.toml
          echo "spreadsheet = \"${{ secrets.GSHEETS_URL }}\"" >> .streamlit/secrets.toml
          echo "service_account = '${{ secrets.GCP_SERVICE_ACCOUNT }}'" >> .streamlit/secrets.toml

      - name: Rodar Minerador
        env:
          # Variáveis de ambiente para o Python localizar
          APP_ID: ${{ secrets.APP_ID }}
          APP_KEY: ${{ secrets.APP_KEY }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          GSHEETS_URL: ${{ secrets.GSHEETS_URL }}
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: python minerador_vagas_brazil.py
